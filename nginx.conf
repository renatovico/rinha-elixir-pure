worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

# Level 1C: TCP-stream load balancer.
#
# nginx is no longer parsing HTTP — it just splices bytes between client
# and upstream Unix sockets. No header rewriting, no keepalive pool
# bookkeeping, no HTTP-level proxy_buffering. Cuts per-request CPU vs the
# previous `http {}` block and lets Cowboy own end-to-end keepalive.
stream {
    error_log /var/log/nginx/error.log warn;
    access_log off;

    upstream api {
        # Round-robin across the two backend Unix sockets.
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
    }

    server {
        listen 9999 backlog=4096 reuseport;
        proxy_pass api;

        proxy_buffer_size 16k;
        proxy_socket_keepalive on;
        proxy_connect_timeout 2s;
        proxy_timeout 60s;
        tcp_nodelay on;
    }
}
